<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Point of Sales</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            min-height: 100vh;
            padding-bottom: 180px;
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px 20px;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header h1 {
            font-size: 1.3rem;
            font-weight: 600;
        }

        .header p {
            font-size: 0.85rem;
            opacity: 0.9;
            margin-top: 3px;
        }

        /* Categories */
        .categories {
            display: flex;
            gap: 10px;
            padding: 15px;
            overflow-x: auto;
            background: white;
            border-bottom: 1px solid #eee;
        }

        .categories::-webkit-scrollbar {
            display: none;
        }

        .category-btn {
            padding: 8px 18px;
            border: none;
            border-radius: 20px;
            background: #f0f0f0;
            color: #333;
            font-size: 0.9rem;
            white-space: nowrap;
            cursor: pointer;
            transition: all 0.2s;
        }

        .category-btn.active {
            background: #667eea;
            color: white;
        }

        /* Products Grid */
        .products {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            padding: 15px;
        }

        .product-card {
            background: white;
            border-radius: 12px;
            padding: 12px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .product-card:active {
            transform: scale(0.96);
        }

        .product-img {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            border-radius: 10px;
            margin: 0 auto 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
        }

        .product-name {
            font-size: 0.9rem;
            font-weight: 500;
            color: #333;
            margin-bottom: 5px;
        }

        .product-price {
            font-size: 0.95rem;
            font-weight: 700;
            color: #667eea;
        }

        /* Cart Panel */
        .cart-panel {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            border-radius: 20px 20px 0 0;
            box-shadow: 0 -5px 20px rgba(0,0,0,0.1);
            max-height: 55vh;
            display: flex;
            flex-direction: column;
            z-index: 200;
        }

        .cart-header {
            padding: 15px 20px;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .cart-header h2 {
            font-size: 1.1rem;
        }

        .cart-count {
            background: #667eea;
            color: white;
            padding: 3px 10px;
            border-radius: 15px;
            font-size: 0.85rem;
        }

        .cart-items {
            flex: 1;
            overflow-y: auto;
            padding: 10px 20px;
            max-height: 200px;
        }

        .cart-item {
            display: flex;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #f0f0f0;
        }

        .cart-item:last-child {
            border-bottom: none;
        }

        .cart-item-info {
            flex: 1;
        }

        .cart-item-name {
            font-size: 0.95rem;
            font-weight: 500;
        }

        .cart-item-price {
            font-size: 0.85rem;
            color: #888;
            margin-top: 2px;
        }

        .cart-item-qty {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .qty-btn {
            width: 28px;
            height: 28px;
            border: none;
            border-radius: 50%;
            background: #f0f0f0;
            font-size: 1.1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .qty-btn:active {
            background: #e0e0e0;
        }

        .qty-value {
            font-weight: 600;
            min-width: 20px;
            text-align: center;
        }

        .cart-empty {
            text-align: center;
            padding: 30px;
            color: #999;
        }

        .cart-footer {
            padding: 15px 20px;
            border-top: 1px solid #eee;
            background: #fafafa;
        }

        .cart-total {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .cart-total-label {
            font-size: 0.95rem;
            color: #666;
        }

        .cart-total-value {
            font-size: 1.4rem;
            font-weight: 700;
            color: #333;
        }

        .checkout-btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .checkout-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .checkout-btn:active:not(:disabled) {
            opacity: 0.9;
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 300;
            padding: 20px;
        }

        .modal-overlay.show {
            display: flex;
        }

        .modal {
            background: white;
            border-radius: 16px;
            padding: 25px;
            width: 100%;
            max-width: 350px;
            text-align: center;
        }

        .modal-icon {
            font-size: 3rem;
            margin-bottom: 15px;
        }

        .modal h3 {
            font-size: 1.2rem;
            margin-bottom: 10px;
        }

        .modal p {
            color: #666;
            font-size: 0.95rem;
            margin-bottom: 20px;
        }

        .modal-btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: #667eea;
            color: white;
            font-size: 1rem;
            cursor: pointer;
        }

        /* Search */
        .search-bar {
            padding: 10px 15px;
            background: white;
        }

        .search-input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #eee;
            border-radius: 10px;
            font-size: 0.95rem;
            outline: none;
        }

        .search-input:focus {
            border-color: #667eea;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🛒 Warung POS</h1>
        <p id="datetime">Loading...</p>
    </div>

    <div class="search-bar">
        <input type="text" class="search-input" placeholder="🔍 Cari produk..." id="searchInput" oninput="filterProducts()">
    </div>

    <div class="categories" id="categories">
        <button class="category-btn active" onclick="filterByCategory('all')">Semua</button>
        <button class="category-btn" onclick="filterByCategory('makanan')">Makanan</button>
        <button class="category-btn" onclick="filterByCategory('minuman')">Minuman</button>
        <button class="category-btn" onclick="filterByCategory('snack')">Snack</button>
    </div>

    <div class="products" id="products"></div>

    <div class="cart-panel">
        <div class="cart-header">
            <h2>🛍️ Keranjang</h2>
            <span class="cart-count" id="cartCount">0 item</span>
        </div>
        <div class="cart-items" id="cartItems">
            <div class="cart-empty">Keranjang kosong</div>
        </div>
        <div class="cart-footer">
            <div class="cart-total">
                <span class="cart-total-label">Total</span>
                <span class="cart-total-value" id="cartTotal">Rp 0</span>
            </div>
            <button class="checkout-btn" id="checkoutBtn" onclick="checkout()" disabled>Bayar Sekarang</button>
        </div>
    </div>

    <div class="modal-overlay" id="modalOverlay" onclick="closeModal()">
        <div class="modal" onclick="event.stopPropagation()">
            <div class="modal-icon">✅</div>
            <h3>Transaksi Berhasil!</h3>
            <p id="modalText">Total: Rp 0</p>
            <button class="modal-btn" onclick="closeModal()">OK</button>
        </div>
    </div>

    <script>
        // Product Data
        const products = [
            { id: 1, name: 'Nasi Goreng', price: 15000, category: 'makanan', emoji: '🍚' },
            { id: 2, name: 'Mie Goreng', price: 13000, category: 'makanan', emoji: '🍜' },
            { id: 3, name: 'Ayam Goreng', price: 18000, category: 'makanan', emoji: '🍗' },
            { id: 4, name: 'Bakso', price: 12000, category: 'makanan', emoji: '🍲' },
            { id: 5, name: 'Sate Ayam', price: 20000, category: 'makanan', emoji: '🍢' },
            { id: 6, name: 'Es Teh Manis', price: 5000, category: 'minuman', emoji: '🧊' },
            { id: 7, name: 'Es Jeruk', price: 7000, category: 'minuman', emoji: '🍊' },
            { id: 8, name: 'Kopi', price: 8000, category: 'minuman', emoji: '☕' },
            { id: 9, name: 'Jus Alpukat', price: 12000, category: 'minuman', emoji: '🥑' },
            { id: 10, name: 'Air Mineral', price: 4000, category: 'minuman', emoji: '💧' },
            { id: 11, name: 'Keripik Singkong', price: 8000, category: 'snack', emoji: '🥔' },
            { id: 12, name: 'Pisang Goreng', price: 6000, category: 'snack', emoji: '🍌' },
            { id: 13, name: 'Risoles', price: 5000, category: 'snack', emoji: '🥟' },
            { id: 14, name: 'Gorengan', price: 3000, category: 'snack', emoji: '🥘' },
            { id: 15, name: 'Roti Bakar', price: 10000, category: 'snack', emoji: '🍞' },
            { id: 16, name: 'Indomie Goreng', price: 10000, category: 'makanan', emoji: '🍜' },
        ];

        let cart = [];
        let currentCategory = 'all';

        // Format currency
        function formatRupiah(num) {
            return 'Rp ' + num.toLocaleString('id-ID');
        }

        // Render products
        function renderProducts(filter = '') {
            const container = document.getElementById('products');
            let filtered = products;

            if (currentCategory !== 'all') {
                filtered = filtered.filter(p => p.category === currentCategory);
            }

            if (filter) {
                filtered = filtered.filter(p => 
                    p.name.toLowerCase().includes(filter.toLowerCase())
                );
            }

            container.innerHTML = filtered.map(p => `
                <div class="product-card" onclick="addToCart(${p.id})">
                    <div class="product-img">${p.emoji}</div>
                    <div class="product-name">${p.name}</div>
                    <div class="product-price">${formatRupiah(p.price)}</div>
                </div>
            `).join('');
        }

        // Filter by category
        function filterByCategory(category) {
            currentCategory = category;
            
            document.querySelectorAll('.category-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            
            filterProducts();
        }

        // Filter products by search
        function filterProducts() {
            const searchValue = document.getElementById('searchInput').value;
            renderProducts(searchValue);
        }

        // Add to cart
        function addToCart(productId) {
            const product = products.find(p => p.id === productId);
            const existingItem = cart.find(item => item.id === productId);

            if (existingItem) {
                existingItem.qty++;
            } else {
                cart.push({ ...product, qty: 1 });
            }

            renderCart();
        }

        // Update quantity
        function updateQty(productId, delta) {
            const item = cart.find(i => i.id === productId);
            if (item) {
                item.qty += delta;
                if (item.qty <= 0) {
                    cart = cart.filter(i => i.id !== productId);
                }
            }
            renderCart();
        }

        // Render cart
        function renderCart() {
            const container = document.getElementById('cartItems');
            const countEl = document.getElementById('cartCount');
            const totalEl = document.getElementById('cartTotal');
            const checkoutBtn = document.getElementById('checkoutBtn');

            if (cart.length === 0) {
                container.innerHTML = '<div class="cart-empty">Keranjang kosong</div>';
                countEl.textContent = '0 item';
                totalEl.textContent = 'Rp 0';
                checkoutBtn.disabled = true;
                return;
            }

            const totalItems = cart.reduce((sum, item) => sum + item.qty, 0);
            const totalPrice = cart.reduce((sum, item) => sum + (item.price * item.qty), 0);

            container.innerHTML = cart.map(item => `
                <div class="cart-item">
                    <div class="cart-item-info">
                        <div class="cart-item-name">${item.emoji} ${item.name}</div>
                        <div class="cart-item-price">${formatRupiah(item.price)}</div>
                    </div>
                    <div class="cart-item-qty">
                        <button class="qty-btn" onclick="updateQty(${item.id}, -1)">−</button>
                        <span class="qty-value">${item.qty}</span>
                        <button class="qty-btn" onclick="updateQty(${item.id}, 1)">+</button>
                    </div>
                </div>
            `).join('');

            countEl.textContent = `${totalItems} item`;
            totalEl.textContent = formatRupiah(totalPrice);
            checkoutBtn.disabled = false;
        }

        // Checkout
        function checkout() {
            const totalPrice = cart.reduce((sum, item) => sum + (item.price * item.qty), 0);
            document.getElementById('modalText').textContent = `Total: ${formatRupiah(totalPrice)}`;
            document.getElementById('modalOverlay').classList.add('show');
            
            // Reset cart
            cart = [];
            renderCart();
        }

        // Close modal
        function closeModal() {
            document.getElementById('modalOverlay').classList.remove('show');
        }

        // Update datetime
        function updateDateTime() {
            const now = new Date();
            const options = { 
                weekday: 'long', 
                year: 'numeric', 
                month: 'long', 
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            };
            document.getElementById('datetime').textContent = now.toLocaleDateString('id-ID', options);
        }

        // Initialize
        renderProducts();
        updateDateTime();
        setInterval(updateDateTime, 60000);
    </script>
</body>
</html>
